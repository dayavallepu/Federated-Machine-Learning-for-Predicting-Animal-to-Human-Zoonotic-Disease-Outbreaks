{% extends "base.html" %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="glass-card p-5" data-aos="zoom-in">
                <div class="text-center mb-4">
                    <h2 class="gradient-text fw-bold">Welcome Back</h2>
                    <p class="text-light">Sign in to your ZoonoticAI account</p>
                </div>

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-4">
                        <label class="form-label text-light">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-dark">
                                <i class="fas fa-user text-light"></i>
                            </span>
                            <input type="text" class="form-control feature-input" name="username" required
                                placeholder="Enter your username">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-light">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-dark">
                                <i class="fas fa-lock text-light"></i>
                            </span>
                            <input type="password" class="form-control feature-input" name="password" required
                                placeholder="Enter your password">
                            <button class="btn btn-outline-light" type="button" onclick="togglePassword(this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label text-light" for="remember">
                            Remember me
                        </label>
                        <a href="#" class="float-end text-decoration-none gradient-text">
                            Forgot password?
                        </a>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn gradient-btn">
                            <i class="fas fa-sign-in-alt me-2"></i>Sign In
                        </button>
                    </div>

                    <div class="text-center mt-4">
                        <p class="text-light">Don't have an account?
                            <a href="{{ url_for('register') }}" class="gradient-text text-decoration-none">
                                Register here
                            </a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePassword(button) {
        const passwordInput = button.parentElement.querySelector('input');
        const icon = button.querySelector('i');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>
{% endblock %}
